services:
  - type: web
    name: user-admi
    runtime: php
    plan: free
    buildCommand: composer install && php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: false

      - key: APP_KEY
        sync: false